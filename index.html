<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Dockerized Website</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea, #764ba2);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #333;
    }

    .card {
      background: #fff;
      padding: 2.5rem;
      border-radius: 16px;
      max-width: 420px;
      width: 90%;
      text-align: center;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
      animation: fadeIn 1s ease-in-out;
    }

    h1 {
      font-weight: 600;
      margin-bottom: 0.75rem;
    }

    p {
      font-size: 0.95rem;
      line-height: 1.6;
      margin-bottom: 1.5rem;
      color: #555;
    }

    .badge {
      display: inline-block;
      background: #667eea;
      color: #fff;
      padding: 0.4rem 0.9rem;
      border-radius: 999px;
      font-size: 0.75rem;
      margin-bottom: 1rem;
    }

    .btn {
      display: inline-block;
      text-decoration: none;
      background: #764ba2;
      color: #fff;
      padding: 0.7rem 1.6rem;
      border-radius: 8px;
      font-size: 0.9rem;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(118, 75, 162, 0.4);
    }

    footer {
      margin-top: 1.5rem;
      font-size: 0.75rem;
      color: #777;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(15px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="badge">Docker Ready 🚀</div>
    <h1>Hello, World!</h1>
    <p>
      This is a simple, modern HTML page served using Docker and Nginx.
      Clean design, responsive layout, and easy to deploy anywhere.
    </p>
    <a href="#" class="btn">Get Started</a>
    <footer>
      © 2026 • Powered by Docker
    </footer>
  </div>

</body>
</html>
